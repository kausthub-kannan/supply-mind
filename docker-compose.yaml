services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/ddl.sql:/docker-entrypoint-initdb.d/01_ddl.sql:ro
      - ./scripts/dml.sql:/docker-entrypoint-initdb.d/02_dml.sql:ro
      - ./scripts/data:/data:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    restart: unless-stopped
    ports:
      - "${LITELLM_PORT}:4000"
    volumes:
      - ./configs/litellm.yaml:/app/config.yaml:ro
    environment:
      MISTRAL_API_KEY: ${MISTRAL_API_KEY}
      LITELLM_PORT: ${LITELLM_PORT}
    command: ["--config", "/app/config.yaml", "--port", "${LITELLM_PORT}", "--detailed_debug"]

volumes:
  postgres_data: